name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate version format
        run: |
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "error: version must be in semver format (e.g. 0.2.0)" >&2
            exit 1
          fi
        env:
          VERSION: ${{ inputs.version }}

      - name: Bump Version.swift
        run: |
          sed -i "s/static let current = \".*\"/static let current = \"$VERSION\"/" \
            Sources/CTXMVCLI/Version.swift
          cat Sources/CTXMVCLI/Version.swift
        env:
          VERSION: ${{ inputs.version }}

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Sources/CTXMVCLI/Version.swift
          git commit -m "chore: bump version to $VERSION"
          git tag "$VERSION"
          git push origin main --tags
        env:
          VERSION: ${{ inputs.version }}

      - name: Create GitHub Release
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes
        env:
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
