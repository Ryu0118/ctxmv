name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate version format
        run: |
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "error: version must be in semver format (e.g. 0.2.0)" >&2
            exit 1
          fi
        env:
          VERSION: ${{ inputs.version }}

      - name: Check tag does not already exist
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/$VERSION$"; then
            echo "error: tag $VERSION already exists" >&2
            exit 1
          fi
        env:
          VERSION: ${{ inputs.version }}

      - name: Bump Version.swift
        run: |
          sed -i "s/static let current = \".*\"/static let current = \"$VERSION\"/" \
            Sources/CTXMVCLI/Version.swift
          cat Sources/CTXMVCLI/Version.swift
        env:
          VERSION: ${{ inputs.version }}

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Sources/CTXMVCLI/Version.swift
          if git diff --cached --quiet; then
            echo "Version.swift already at $VERSION, skipping commit"
          else
            git commit -m "chore: bump version to $VERSION"
          fi
          git tag "$VERSION"
          git push origin main --tags
        env:
          VERSION: ${{ inputs.version }}

  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.version }}

      - name: Select Xcode 26.2
        run: sudo xcode-select --switch /Applications/Xcode_26.2.app/Contents/Developer

      - name: Build Universal Binary
        run: xcrun swift build -c release --arch arm64 --arch x86_64

      - name: Create Archive
        run: |
          cd .build/apple/Products/Release
          tar -czvf "ctxmv-${VERSION}-darwin-universal.tar.gz" ctxmv
          shasum -a 256 "ctxmv-${VERSION}-darwin-universal.tar.gz" > "ctxmv-${VERSION}-darwin-universal.tar.gz.sha256"
        env:
          VERSION: ${{ inputs.version }}

      - name: Upload release archive
        uses: actions/upload-artifact@v5
        with:
          name: ctxmv-darwin-universal
          path: |
            .build/apple/Products/Release/ctxmv-${{ inputs.version }}-darwin-universal.tar.gz
            .build/apple/Products/Release/ctxmv-${{ inputs.version }}-darwin-universal.tar.gz.sha256
          if-no-files-found: error

      - name: Upload binary for artifact bundle
        uses: actions/upload-artifact@v5
        with:
          name: binary-macos
          path: .build/apple/Products/Release/ctxmv
          if-no-files-found: error

  build-linux:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.version }}

      - name: Install Swift (setup-swift)
        if: matrix.arch == 'x86_64'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: Install Swift (manual arm64)
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get update && sudo apt-get install -y binutils gnupg2 libc6-dev libcurl4-openssl-dev \
            libedit2 libgcc-13-dev libncurses-dev libpython3-dev libsqlite3-dev libstdc++-13-dev \
            libxml2-dev libz3-dev pkg-config tzdata unzip zlib1g-dev
          SWIFT_URL="https://download.swift.org/swift-6.2.1-release/ubuntu2404-aarch64/swift-6.2.1-RELEASE/swift-6.2.1-RELEASE-ubuntu24.04-aarch64.tar.gz"
          curl -fsSL "$SWIFT_URL" -o /tmp/swift.tar.gz
          sudo mkdir -p /opt/swift
          sudo tar xzf /tmp/swift.tar.gz -C /opt/swift --strip-components=1
          echo "/opt/swift/usr/bin" >> "$GITHUB_PATH"
          rm /tmp/swift.tar.gz

      - name: Install dependencies
        if: matrix.arch == 'x86_64'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Build Linux Binary
        run: swift build -c release --static-swift-stdlib

      - name: Create Archive
        run: |
          cd .build/release
          tar -czvf "ctxmv-${VERSION}-linux-${ARCH}.tar.gz" ctxmv
          sha256sum "ctxmv-${VERSION}-linux-${ARCH}.tar.gz" > "ctxmv-${VERSION}-linux-${ARCH}.tar.gz.sha256"
        env:
          VERSION: ${{ inputs.version }}
          ARCH: ${{ matrix.arch }}

      - name: Upload release archive
        uses: actions/upload-artifact@v5
        with:
          name: ctxmv-linux-${{ matrix.arch }}
          path: |
            .build/release/ctxmv-${{ inputs.version }}-linux-${{ matrix.arch }}.tar.gz
            .build/release/ctxmv-${{ inputs.version }}-linux-${{ matrix.arch }}.tar.gz.sha256
          if-no-files-found: error

      - name: Upload binary for artifact bundle
        uses: actions/upload-artifact@v5
        with:
          name: binary-linux-${{ matrix.arch }}
          path: .build/release/ctxmv
          if-no-files-found: error

  create-release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all release archives
        uses: actions/download-artifact@v5
        with:
          pattern: ctxmv-*
          path: /tmp/release-assets
          merge-multiple: true

      - name: Download binaries for artifact bundle
        uses: actions/download-artifact@v5
        with:
          name: binary-macos
          path: /tmp/binaries/macos

      - uses: actions/download-artifact@v5
        with:
          name: binary-linux-x86_64
          path: /tmp/binaries/linux-x86_64

      - uses: actions/download-artifact@v5
        with:
          name: binary-linux-arm64
          path: /tmp/binaries/linux-arm64

      - name: Create Artifact Bundle
        run: |
          BUNDLE="ctxmv.artifactbundle"

          mkdir -p "$BUNDLE/ctxmv-macos/bin" \
                   "$BUNDLE/ctxmv-linux-x86_64/bin" \
                   "$BUNDLE/ctxmv-linux-arm64/bin"

          cp /tmp/binaries/macos/ctxmv "$BUNDLE/ctxmv-macos/bin/ctxmv"
          cp /tmp/binaries/linux-x86_64/ctxmv "$BUNDLE/ctxmv-linux-x86_64/bin/ctxmv"
          cp /tmp/binaries/linux-arm64/ctxmv "$BUNDLE/ctxmv-linux-arm64/bin/ctxmv"
          chmod +x "$BUNDLE/ctxmv-macos/bin/ctxmv" \
                   "$BUNDLE/ctxmv-linux-x86_64/bin/ctxmv" \
                   "$BUNDLE/ctxmv-linux-arm64/bin/ctxmv"

          cat > "$BUNDLE/info.json" <<EOF
          {
            "schemaVersion": "1.0",
            "artifacts": {
              "ctxmv": {
                "version": "${VERSION}",
                "type": "executable",
                "variants": [
                  {
                    "path": "ctxmv-macos/bin/ctxmv",
                    "supportedTriples": ["x86_64-apple-macosx", "arm64-apple-macosx"]
                  },
                  {
                    "path": "ctxmv-linux-x86_64/bin/ctxmv",
                    "supportedTriples": ["x86_64-unknown-linux-gnu"]
                  },
                  {
                    "path": "ctxmv-linux-arm64/bin/ctxmv",
                    "supportedTriples": ["aarch64-unknown-linux-gnu"]
                  }
                ]
              }
            }
          }
          EOF

          zip -r "ctxmv-${VERSION}.artifactbundle.zip" "$BUNDLE"
          sha256sum "ctxmv-${VERSION}.artifactbundle.zip" > "ctxmv-${VERSION}.artifactbundle.zip.sha256"
        env:
          VERSION: ${{ inputs.version }}

      - name: Create GitHub Release with all assets
        run: |
          gh release create "$VERSION" \
            /tmp/release-assets/* \
            "ctxmv-${VERSION}.artifactbundle.zip" \
            "ctxmv-${VERSION}.artifactbundle.zip.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$VERSION" \
            --generate-notes
        env:
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
